name: Bizinfo Email Notice Monitor

on:
  schedule:
    - cron: "12 23 * * 3"  # 매주 월요일 10:00 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Bizinfo email monitor
        env:
          BIZINFO_CRTFC_KEY: ${{ secrets.BIZINFO_CRTFC_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_CC: ${{ secrets.MAIL_CC }}
        run: python main.py

      - name: Commit updated notice state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add seen_notice_ids.json
          git commit -m "Update seen Bizinfo email notices" || echo "No changes to commit"
          git push
